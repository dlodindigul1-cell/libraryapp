<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>திண்டுக்கல் மாவட்ட நூலகம் — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a4f7a;
    --primary-light: #2563a8;
    --accent: #e85d26;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #cbd5e1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans Tamil', 'Arial Unicode MS', sans-serif;
    background: linear-gradient(180deg, var(--bg) 0%, #e2e8f0 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  header { text-align: center; margin-bottom: 40px; }
  header .dept { font-size: 15px; font-weight: 600; color: var(--text-muted); }
  header h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--primary);
    margin: 6px 0 0;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 22px;
    width: 100%;
    max-width: 820px;
  }
  a.card, div.card {
    background: var(--white);
    border-radius: 16px;
    padding: 32px 22px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    box-shadow: 0 4px 14px rgba(15, 42, 67, 0.08);
    border: 1px solid var(--border);
    transition: transform .15s ease, box-shadow .15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
  }
  a.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 24px rgba(15, 42, 67, 0.14);
    border-color: var(--primary-light);
  }
  .icon {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: linear-gradient(135deg, var(--primary-light), var(--primary));
    color: white;
  }
  .card.disabled .icon { background: linear-gradient(135deg, #94a3b8, #64748b); }
  .card-title { font-size: 17px; font-weight: 700; }
  .card-sub { font-size: 13px; color: var(--text-muted); }
  .badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: #fef3c7;
    color: #92400e;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .card.disabled {
    cursor: not-allowed;
    opacity: 0.72;
  }
  footer {
    margin-top: 48px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="dept">தமிழ்நாடு அரசு பொது நூலகத்துறை</div>
  <h1>திண்டுக்கல் மாவட்ட நூலக ஆணைக்குழு</h1>
</header>

<div class="cards">

  <a class="card" href="/leave">
    <div class="icon">📝</div>
    <div class="card-title">விடுப்பு பதிவு</div>
    <div class="card-sub">Leave Application</div>
  </a>

  <a class="card" href="/pettycash">
    <div class="icon">💰</div>
    <div class="card-title">சில்லறை செலவினம்</div>
    <div class="card-sub">Petty Cash Contingent</div>
  </a>

  <div class="card disabled" onclick="comingSoon()">
    <span class="badge">விரைவில்</span>
    <div class="icon">📚</div>
    <div class="card-title">புத்தகம் தேடல்</div>
    <div class="card-sub">Book Search</div>
  </div>

</div>

<footer>&copy; திண்டுக்கல் மாவட்ட மைய நூலகம்</footer>

<script>
  function comingSoon() {
    alert("📚 புத்தகம் தேடல் — இந்த பகுதி விரைவில் இயங்கும்.");
  }
</script>

</body>
</html>
